# ─────────────────────────────────────────
# DIAGNOSTICS
# TPS monitoring and performance alerts
# ─────────────────────────────────────────
diagnostics:
  # TPS level that triggers a warning to online ops
  tps-alert-threshold: 18.0
  # Minimum seconds between repeated alerts (avoids spam)
  alert-cooldown-seconds: 300
  cap-saturation-alert-percent: 80

# ─────────────────────────────────────────
# UPDATE CHECKER
# ─────────────────────────────────────────
update-checker: true
