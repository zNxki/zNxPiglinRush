# ╔══════════════════════════════════════════════╗
# ║          zNxPiglinRush  config.yml           ║
# ║          config-version: 2                   ║
# ╚══════════════════════════════════════════════╝

# Internal version — used by the ConfigUpdater to detect and migrate old configs.
# DO NOT change this manually.
config-version: 2

# Master switch — disables all spawning without unloading the plugin
enabled: true

# Worlds where the plugin is active (leave empty = ALL worlds)
active-worlds: []

# Debug mode: logs every spawn attempt, cooldown hit and entity cap check
debug: false

# ─────────────────────────────────────────
# SPAWNER BLOCKS
# One entry per block type. Each block has its own mob, rates, wave mode
# and custom drops. Add as many blocks as you like.
# ─────────────────────────────────────────
spawners:

  magma_block:
    mob: ZOMBIFIED_PIGLIN
    # Total mobs to attempt per trigger (vanilla spawns 1; this adds N-1 extra)
    spawn-count: 3
    # Minimum ticks between spawns on the same block (20 ticks = 1 second)
    spawn-cooldown: 20
    # Entity cap — no more spawns if this many mobs are within scan-radius
    max-nearby-entities: 12
    # Radius (blocks) for the entity cap scan
    scan-radius: 10
    # Random bonus attempts per trigger for variance
    extra-attempts: 1
    # Wave mode: accumulate triggers, fire a scaled burst every wave-cooldown ticks
    wave-mode: false
    wave-size: 5
    wave-cooldown: 100
    # Custom drops injected on death (on top of vanilla loot)
    custom-drops:
      - material: GOLD_NUGGET
        min: 1
        max: 3
        chance: 0.3
      - material: GOLDEN_SWORD
        min: 1
        max: 1
        chance: 0.05

